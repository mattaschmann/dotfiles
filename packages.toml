[apt]
install = [
  "build-essential",
  "cmake",
  "keychain",
  "libssl-dev",
  "pkg-config",
  "tmux",
  "wamerican",
]

[brew]
formulae = [
  "antidote",
  "awscli",
  "cmake",
  "ctop",
  "derailed/k9s/k9s",
  "docker-compose",
  "fnm",
  "fzf",
  "git-filter-repo",
  "git-lfs",
  "htop",
  "imagemagick",
  "lua-language-server",
  "luarocks",
  "neovim",
  "podman",
  "postgresql@14",
  "resvg",
  "sevenzip",
  "tig",
  "urlview",
  "wget",
]
taps = ["anomalyco/tap"]
ignore = ["duckdb", "ggml", "glab", "libomp", "llama.cpp", "llmfit"]

[brew.osx]
formulae = ["tmux", "watch"]
casks = ["alacritty", "font-sauce-code-pro-nerd-font"]
taps = ["derailed/k9s", "scalacenter/bloop"]

[cargo]
install = [
  "bat",
  "cargo-binstall",
  "cargo-cache",
  "cargo-update",
  "exa",
  "fd-find",
  "ripgrep",
  "starship",
  "stylua",
  "taplo-cli",
  "tree-sitter-cli",
  "yazi-cli",
  "yazi-fm",
  "zoxide",
]
git = ["https://github.com/errata-ai/vale-ls"]
ignore = ["wlog", "yazi-build"]

[uv]
install = ["opencode-monitor[charts,export]", "pynvim", "skillcheck"]
ignore = []

[npm]
install = [
  "bash-language-server",
  "codeburn",
  "fixjson",
  "neovim",
  "npm-check",
  "opencode-ai",
  "openrtk",
  "prettier",
  "vscode-langservers-extracted",
  "wsl-open",
  "yaml-language-server",
]
ignore = ["corepack", "npm"]

[opencode]
plugins = [
  "~/workspace/opencode-plugins/opencode-keepalive",
  "~/workspace/opencode-plugins/opencode-kirocli-bridge",
  "~/workspace/opencode-plugins/opencode-ping",
]

[vscode]
extensions = ["tyriar.sort-lines", "vscodevim.vim"]

[install]
create = ["~/.local/bin", "~/opt", "~/.ssh"]
clean = ["~"]

[install.defaults]
link = { create = true, relink = true }
shell = { quiet = true }

[install.links]
"~/.config/nvim/init.lua" = "nvim/init.lua"
"~/.config/nvim/lua" = "nvim/lua"
"~/.config/nvim/vimscripts" = "nvim/vimscripts"
"~/.config/nvim/snippets" = { path = "nvim/snippets", force = true }
"~/.config/opencode/AGENTS.md" = "opencode/AGENTS.md"
"~/.config/opencode/agents" = "opencode/agents"
"~/.config/opencode/commands" = "opencode/commands"
"~/.config/opencode/opencode.jsonc" = "opencode/opencode.jsonc"
"~/.config/opencode/skills" = "opencode/skills"
"~/.claude/CLAUDE.md" = { path = "opencode/AGENTS.md", force = true }
"~/.claude/skills" = "opencode/skills"
"~/.config/starship.toml" = "starship/starship.toml"
"~/.ctags.d" = "universal_ctags"
"~/.dotfiles" = ""
"~/.ignore" = "rg/.ignore"
"~/.jsbeautifyrc" = "jsbeautify/.jsbeautifyrc"
"~/.tigrc" = "tig/.tigrc"
"~/.tmux.conf" = "tmux/.tmux.conf"
"~/.zsh_plugins.txt" = "zsh/.zsh_plugins.txt"
"~/.zshrc" = { path = "zsh/.zshrc", force = true }
"~/scripts" = "scripts/"
"~/.urlview" = { path = "urlview/{os}.urlview" }
"~/.config/alacritty/alacritty.toml" = { path = "alacritty/alacritty.{os}.toml" }

[install.links.wsl]
"~/.local/bin/xdg-open" = "~/.local/bin/wsl-open"

[[install.copies]]
source = "alacritty/alacritty.{os}.toml"
target = "${WIN_APPDATA}/alacritty/alacritty.toml"
os = ["wsl"]

[[install.shell]]
description = "Add terminfos for italics"
command = "tic terminfo/xterm-256color.terminfo && tic terminfo/tmux.terminfo"

[install.doctor]
commands = { brew = "https://brew.sh/", uv = "https://github.com/astral-sh/uv", cargo = "https://doc.rust-lang.org/cargo/getting-started/installation.html" }
dirs = { "~/.tmux/plugins/tpm" = "https://github.com/tmux-plugins/tpm", "~/.oh-my-zsh" = "https://ohmyz.sh/" }
