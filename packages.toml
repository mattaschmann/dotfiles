[apt]
install = [
  "build-essential",
  "cmake",
  "keychain",
  "libssl-dev",
  "pkg-config",
  "tmux",
  "wamerican",
]

[brew]
formulae = [
  "antidote",
  "awscli",
  "cmake",
  "ctop",
  "derailed/k9s/k9s",
  "docker-compose",
  "fnm",
  "fzf",
  "git-filter-repo",
  "git-lfs",
  "htop",
  "imagemagick",
  "lua-language-server",
  "luarocks",
  "neovim",
  "podman",
  "postgresql@14",
  "resvg",
  "sevenzip",
  "tig",
  "urlview",
  "wget",
]
taps = ["anomalyco/tap"]
ignore = ["duckdb", "ggml", "libomp", "llama.cpp", "llmfit"]

[brew.osx]
formulae = ["tmux"]
casks = ["alacritty", "font-sauce-code-pro-nerd-font"]
taps = ["derailed/k9s", "scalacenter/bloop"]

[cargo]
install = [
  "bat",
  "cargo-binstall",
  "cargo-cache",
  "cargo-update",
  "exa",
  "fd-find",
  "ripgrep",
  "starship",
  "stylua",
  "taplo-cli",
  "tree-sitter-cli",
  "yazi-cli",
  "yazi-fm",
  "zoxide",
]
git = ["https://github.com/errata-ai/vale-ls"]
ignore = ["wlog", "yazi-build"]

[uv]
install = ["opencode-monitor[charts,export]", "pynvim", "skillcheck"]
ignore = []

[uv.wsl]
install = ["ntfy-wsl-toast"]

[npm]
install = [
  "bash-language-server",
  "codeburn",
  "neovim",
  "npm-check",
  "opencode-ai",
  "openrtk",
  "prettier",
  "vscode-langservers-extracted",
  "wsl-open",
  "yaml-language-server",
]
ignore = ["corepack", "npm"]

[opencode]
plugins = [
  "~/workspace/opencode-plugins/opencode-keepalive",
  "~/workspace/opencode-plugins/opencode-kirocli-bridge",
  "~/workspace/opencode-plugins/opencode-ping",
]

[vscode]
extensions = ["tyriar.sort-lines", "vscodevim.vim"]
